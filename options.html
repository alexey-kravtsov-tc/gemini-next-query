<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 16px; width: 300px; background: #1e1e1e; color: #fff; }
        .group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-size: 14px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 8px; background: #8ab4f8; border: none; color: #000; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #aecbfa; }
        #status { color: #81c995; font-size: 13px; margin-top: 8px; text-align: center; height: 16px; }
    </style>
</head>
<body>
    <div class="group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
    </div>
    <div class="group">
        <label>Max Words per Query Option</label>
        <input type="number" id="maxWords" value="20">
    </div>
    <button id="saveBtn">Save Settings</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>
</html>
