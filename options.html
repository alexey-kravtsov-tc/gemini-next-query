<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 16px; width: 340px; background: #1e1e1e; color: #fff; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold; }
        .description { font-size: 12px; color: #aaa; margin-bottom: 8px; line-height: 1.4; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; background: #333; border: 1px solid #555; color: #fff; border-radius: 6px; }
        button { width: 100%; padding: 10px; background: #8ab4f8; border: none; color: #000; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 8px; }
        button:hover { background: #aecbfa; }
        #testApiKey { background: #555; color: #fff; }
        #status { color: #81c995; font-size: 13px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
        <button id="testApiKey">Test API Key & Fetch Models</button>
    </div>
    <div class="group">
        <label>Model</label>
        <select id="modelSelect"></select>
    </div>
    <div class="group">
        <label>Max Words</label>
        <input type="number" id="maxWords" value="20">
    </div>
    <button id="saveBtn">Save Settings</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>
</html>
