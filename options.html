<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 16px; width: 340px; background: #1e1e1e; color: #fff; }
        .group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: bold; }
        .description { font-size: 12px; color: #aaa; margin-bottom: 8px; line-height: 1.4; }
        .description a { color: #8ab4f8; text-decoration: none; }
        .description a:hover { text-decoration: underline; }
        input { width: 100%; padding: 8px; box-sizing: border-box; background: #333; border: 1px solid #555; color: #fff; border-radius: 6px; }
        button { width: 100%; padding: 10px; background: #8ab4f8; border: none; color: #000; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 4px; }
        button:hover { background: #aecbfa; }
        #status { color: #81c995; font-size: 13px; margin-top: 10px; text-align: center; height: 16px; }
    </style>
</head>
<body>
    <div class="group">
        <label>Gemini API Key</label>
        <div class="description">
            Get your API key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.<br>
            Click "Create API key", copy the generated key, and paste it below.
        </div>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
    </div>
    <div class="group">
        <label>Max Words per Query Option</label>
        <div class="description">Limit how long the predicted buttons will be.</div>
        <input type="number" id="maxWords" value="20">
    </div>
    <button id="saveBtn">Save Settings</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>
</html>
