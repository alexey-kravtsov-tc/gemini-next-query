<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 16px; width: 400px; background: #1e1e1e; color: #fff; }
        .group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-size: 14px; font-weight: bold; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        textarea { width: 100%; height: 120px; background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 8px; box-sizing: border-box; border: 1px solid #444; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; background: #333; border: 1px solid #555; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #8ab4f8; border: none; color: #000; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 8px; }
        #testApiKey { background: #555; color: #fff; }
        #status { color: #81c995; font-size: 13px; margin-top: 8px; text-align: center; }
    </style>
</head>
<body>
    <div class="group">
        <label>Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy...">
        <button id="testApiKey">Test API Key & Fetch Models</button>
    </div>
    <div class="group">
        <label>Model</label>
        <select id="modelSelect"></select>
    </div>
    <div class="group">
        <label>Max Words</label>
        <input type="number" id="maxWords" value="20">
    </div>
    <div class="checkbox-group">
        <input type="checkbox" id="showLogsToggle">
        <label for="showLogsToggle" style="font-weight: normal; margin-bottom: 0;">Show Debug Logs</label>
    </div>
    <div class="group" id="logContainer" style="display: none;">
        <label>Debug Console</label>
        <textarea id="logs" readonly></textarea>
    </div>
    <button id="saveBtn">Save Settings</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>
</html>
